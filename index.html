  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>

const legend=document.getElementById("legend");
Object.values(CAT).forEach(c=>{const s=document.createElement("span");s.innerHTML=`<i class="swatch" style="background:${c.c}"></i>${c.label}`;legend.appendChild(s);});

// 判斷今天是第幾天（旅途中自動跳到當天）
const todayIdx=(function(){
  try{
    const now=new Date();
    const key=(now.getMonth()+1)+"/"+now.getDate()+"（";
    for(let i=0;i<DAYS.length;i++){if(DAYS[i].date.indexOf(key)===0)return i;}
  }catch(e){}
  return -1;
})();
const startIdx=todayIdx>=0?todayIdx:0;

const tabs=document.getElementById("tabs"),daysEl=document.getElementById("days");
DAYS.forEach((d,i)=>{
  const tab=document.createElement("button");
  tab.className="tab"+(i===startIdx?" active":"")+(i===todayIdx?" today":"");
  tab.innerHTML=`<b>${d.n.replace("DAY ","D")}</b>${d.date.split("（")[0]}`+(i===todayIdx?`<span class="badge">今天</span>`:"");
  tab.onclick=()=>show(i);tabs.appendChild(tab);
  const day=document.createElement("section");
  day.className="day"+(i===startIdx?" show":"");
  let nowpill=(i===todayIdx)?`<div class="nowpill" id="nowpill">現在</div>`:"";
  let html=`<div class="day-head"><div class="day-num">${d.n} · ${d.date}</div><div class="day-theme">${d.theme}</div><div class="day-sub">${d.sub}</div>${nowpill}</div><div class="tl">`;
  d.items.forEach((it,idx)=>{
    const cat=CAT[it.cat];
    let meta=it.meta?`<div class="meta">`+it.meta.map(m=>`<div><span class="k">${m[0]}</span>：${m[1]}</div>`).join("")+`</div>`:"";
    const price=it.price?`<div class="price">${it.price}</div>`:"";
    const note=it.note?`<div class="note">${it.note}</div>`:"";
    const naver=it.naver?`<div class="actions"><a class="naver" target="_blank" rel="noopener" href="https://map.naver.com/p/search/${encodeURIComponent(it.naver)}"><span class="n">NAVER</span> 地圖 ↗</a></div>`:"";
    const tag=it.alt?`<span class="alt-tag">備選</span>`:`<span class="pill">${cat.label}</span>`;
    const mm=(it.t||"").match(/(\d{1,2}):(\d{2})/);
    const dataMin=mm?` data-min="${parseInt(mm[1],10)*60+parseInt(mm[2],10)}"`:"";
    html+=`<div class="item" style="--dotc:${cat.c};--i:${idx}"${dataMin}><div class="time${it.t?'':' empty'}">${it.t||'彈性'}</div><div class="card${it.alt?' alt':''}"><div class="top"><div class="title">${it.title}</div>${tag}</div>${meta}${price}${note}${naver}</div></div>`;
  });
  html+=`</div>`;day.innerHTML=html;daysEl.appendChild(day);
});
function show(i){
  document.querySelectorAll(".tab").forEach((t,k)=>t.classList.toggle("active",k===i));
  document.querySelectorAll(".day").forEach((d,k)=>d.classList.toggle("show",k===i));
  window.scrollTo({top:0,behavior:"smooth"});
}
// 即時更新「現在」與「接下來」標記（僅當天）
function refreshNow(){
  if(todayIdx<0)return;
  const now=new Date();
  const cur=now.getHours()*60+now.getMinutes();
  const np=document.getElementById("nowpill");
  if(np){const hh=String(now.getHours()).padStart(2,"0"),mm=String(now.getMinutes()).padStart(2,"0");np.textContent="現在 "+hh+":"+mm;}
  const day=document.querySelectorAll(".day")[todayIdx];
  if(!day)return;
  day.querySelectorAll(".item.next").forEach(el=>el.classList.remove("next"));
  const items=Array.prototype.slice.call(day.querySelectorAll(".item[data-min]"));
  let next=null;
  for(let k=0;k<items.length;k++){if(parseInt(items[k].getAttribute("data-min"),10)>=cur){next=items[k];break;}}
  if(next)next.classList.add("next");
}
refreshNow();
setInterval(refreshNow,30000);
</script>
